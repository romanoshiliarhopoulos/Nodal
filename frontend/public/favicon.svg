<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#111111"/>

  <!-- Dot matrix N — 5 cols x 5 rows, spacing 5px, origin (4,6) -->
  <!-- Col x positions: 4, 9, 14, 19, 24 -->
  <!-- Row y positions: 6, 11, 16, 21, 26 -->

  <!-- OFF dots (dim grid) -->
  <circle cx="9"  cy="6"  r="1.8" fill="#2e2e2e"/>
  <circle cx="14" cy="6"  r="1.8" fill="#2e2e2e"/>
  <circle cx="19" cy="6"  r="1.8" fill="#2e2e2e"/>
  <circle cx="14" cy="11" r="1.8" fill="#2e2e2e"/>
  <circle cx="9"  cy="16" r="1.8" fill="#2e2e2e"/>
  <circle cx="19" cy="16" r="1.8" fill="#2e2e2e"/>
  <circle cx="9"  cy="21" r="1.8" fill="#2e2e2e"/>
  <circle cx="14" cy="21" r="1.8" fill="#2e2e2e"/>
  <circle cx="9"  cy="26" r="1.8" fill="#2e2e2e"/>
  <circle cx="14" cy="26" r="1.8" fill="#2e2e2e"/>
  <circle cx="19" cy="26" r="1.8" fill="#2e2e2e"/>

  <!-- ON dots (white) -->
  <!-- Left vertical: col 0, all rows -->
  <circle cx="4"  cy="6"  r="2.2" fill="#ffffff"/>
  <circle cx="4"  cy="11" r="2.2" fill="#ffffff"/>
  <circle cx="4"  cy="16" r="2.2" fill="#ffffff"/>
  <circle cx="4"  cy="21" r="2.2" fill="#ffffff"/>
  <circle cx="4"  cy="26" r="2.2" fill="#ffffff"/>

  <!-- Diagonal: row1 col1, row2 col2, row3 col3 -->
  <circle cx="9"  cy="11" r="2.2" fill="#ffffff"/>
  <circle cx="14" cy="16" r="2.2" fill="#ffffff"/>
  <circle cx="19" cy="21" r="2.2" fill="#ffffff"/>

  <!-- Right vertical: col 4, all rows -->
  <circle cx="24" cy="6"  r="2.2" fill="#ffffff"/>
  <circle cx="24" cy="11" r="2.2" fill="#ffffff"/>
  <circle cx="24" cy="16" r="2.2" fill="#ffffff"/>
  <circle cx="24" cy="21" r="2.2" fill="#ffffff"/>
  <circle cx="24" cy="26" r="2.2" fill="#ffffff"/>
</svg>
